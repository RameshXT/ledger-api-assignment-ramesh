name: Secure CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # Gitleaks: hard-blocks the pipeline. Any detected secret stops 
  # the build entirely — no warnings, no exceptions, since a leaked credential 
  # is critical severity by definition.
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Semgrep: hard-blocks on ERROR-severity findings (e.g. injection, RCE-class issues). 
  # WARNING-level findings are reported but do not block the pipeline, since not every 
  # style/best-practice suggestion warrants stopping deployment.
  sast-scan:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          # 1. Report all findings (including warnings) but do not block the build
          semgrep scan --config auto task-1-hardening/app || true
          
          # 2. Hard block only if there are ERROR-severity findings
          semgrep scan --config auto --severity ERROR --error task-1-hardening/app

  build-and-push:
    needs: [secrets-scan, sast-scan]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        id: build
        run: |
          # Retrieve the short SHA for image tagging to avoid using "latest" (which is blocked by Kyverno)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$OWNER/ledger-api:$SHORT_SHA
          
          # Built directly from task-1-hardening/app/ to maintain a single source of truth 
          # for the application source code and avoid duplication in task-2-cicd.
          docker build -t "$IMAGE" ./task-1-hardening/app
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign container image
        run: |
          cosign sign --yes "${{ steps.build.outputs.image }}"

      - name: Generate SLSA provenance attestation
        run: |
          echo '{"builder":{"id":"https://github.com/Attestations/GitHubHost"},"buildType":"https://github.com/Attestations/GitHubHost@v1"}' > predicate.json
          cosign attest --yes --type slsaprovenance --predicate predicate.json "${{ steps.build.outputs.image }}"

  # Trivy: hard-blocks on CRITICAL/HIGH severity CVEs in dependencies or the built image. 
  # MEDIUM/LOW findings are reported but do not block, since we prioritize fixing what's 
  # actually exploitable first. Unfixed CRITICAL/HIGH CVEs still block by default; if 
  # this becomes impractical later, exceptions will be documented explicitly per-CVE, 
  # the same way we handled the Semgrep findings.
  image-scan:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan (Dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'task-1-hardening/app'
          scanners: 'vuln'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy Image Scan (Container Image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ needs.build-and-push.outputs.image }}
          scanners: 'vuln'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          severity: 'CRITICAL,HIGH'
