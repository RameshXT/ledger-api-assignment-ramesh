name: Secure CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

jobs:
  # Gitleaks: hard-blocks the pipeline. Any detected secret stops 
  # the build entirely — no warnings, no exceptions, since a leaked credential 
  # is critical severity by definition.
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Semgrep: hard-blocks on ERROR-severity findings (e.g. injection, RCE-class issues). 
  # WARNING-level findings are reported but do not block the pipeline, since not every 
  # style/best-practice suggestion warrants stopping deployment.
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep and Generate SARIF
        run: |
          semgrep scan --config auto --sarif --output semgrep.sarif task-1-hardening/app || true

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Run Semgrep Blocker (Fail on ERROR)
        run: |
          semgrep scan --config auto --severity ERROR --error task-1-hardening/app

  build-and-push:
    needs: [secrets-scan, sast-scan]
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        id: build
        run: |
          # Retrieve the short SHA for image tagging to avoid using "latest" (which is blocked by Kyverno)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/$OWNER/ledger-api:$SHORT_SHA
          
          # Built directly from task-1-hardening/app/ to maintain a single source of truth 
          # for the application source code and avoid duplication in task-2-cicd.
          docker build -t "$IMAGE" ./task-1-hardening/app
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT



  # Trivy: hard-blocks on CRITICAL/HIGH severity CVEs in dependencies or the built image. 
  # MEDIUM/LOW findings are reported but do not block, since we prioritize fixing what's 
  # actually exploitable first. Unfixed CRITICAL/HIGH CVEs still block by default; if 
  # this becomes impractical later, exceptions will be documented explicitly per-CVE, 
  # the same way we handled the Semgrep findings.
  image-scan:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'task-1-hardening/app'
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          ignore-unfixed: false
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy FS SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'

      - name: Run Trivy Image Scan (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ needs.build-and-push.outputs.image }}
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          ignore-unfixed: false
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Image SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      - name: Run Trivy FS Blocker (Table output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'task-1-hardening/app'
          scanners: 'vuln'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy Image Blocker (Table output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ needs.build-and-push.outputs.image }}
          scanners: 'vuln'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false
          severity: 'CRITICAL,HIGH'

  sign-and-attest:
    needs: [build-and-push, image-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Generate SLSA predicate.json
        run: |
          IMAGE_REF="${{ needs.build-and-push.outputs.image }}"
          docker pull "$IMAGE_REF"
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_REF" | cut -d'@' -f2)
          
          echo "Constructing predicate for $IMAGE_REF @ $IMAGE_DIGEST"
          cat <<EOF > predicate.json
          {
            "builder": {
              "id": "https://github.com/Attestations/GitHubHost"
            },
            "buildType": "https://github.com/Attestations/GitHubHost@v1",
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/RameshXT/ledger-api-assignment-ramesh.git",
                "digest": {
                  "sha1": "${{ github.sha }}"
                },
                "entryPoint": ".github/workflows/ci-cd.yml"
              },
              "parameters": {
                "runId": "${{ github.run_id }}",
                "runNumber": "${{ github.run_number }}"
              }
            },
            "subject": [
              {
                "name": "$IMAGE_REF",
                "digest": {
                  "sha256": "$IMAGE_DIGEST"
                }
              }
            ]
          }
          EOF

      - name: Sign container image
        run: |
          cosign sign --yes "${{ needs.build-and-push.outputs.image }}"

      - name: Generate SLSA provenance attestation
        run: |
          cosign attest --yes --type slsaprovenance --predicate predicate.json "${{ needs.build-and-push.outputs.image }}"

  update-manifest:
    needs: [build-and-push, sign-and-attest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update deployment image tag
        run: |
          IMAGE_REF="${{ needs.build-and-push.outputs.image }}"
          sed -i -E "s|image: .*ledger-api:.*|image: $IMAGE_REF|g" task-1-hardening/deploy/deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add task-1-hardening/deploy/deployment.yaml
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git commit -m "ci: deploy image $SHORT_SHA [skip ci]"
          git push

