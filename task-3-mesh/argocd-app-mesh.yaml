apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-mesh
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RameshXT/ledger-api-assignment-ramesh.git
    targetRevision: HEAD
    path: task-3-mesh
    directory:
      exclude: "{tmp-*.yaml,patch-*.yaml,*.sh,*.png,README.md,TASK3_CHECKLIST.md,EVIDENCE.md}"
  destination:
    server: https://kubernetes.default.svc
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
